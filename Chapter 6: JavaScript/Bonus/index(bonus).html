<html>
  <title>RGB Guesser</title>
  <link rel="stylesheet" href="style(bonus).css" />
    <script src="index(bonus).js" defer></script>
<body>

  
  <div id="game-screen">

    
    <header>
      <h1>RGB Guesser</h1>
      <div id="lives-display">
        <span class="life">❤️</span>
        <span class="life">❤️</span>
        <span class="life">❤️</span>    
      </div>
    </header>
    <p id="rgb-value">rgb(—, —, —)</p>

    <p id="feedback"></p>

    <div id="options">
      <button class="option-btn" id="option-0"></button>
      <button class="option-btn" id="option-1"></button>
      <button class="option-btn" id="option-2"></button>
    </div>

    <p id="score">Score: 0</p>

  </div>
  
  <div id="end-screen" class="hidden">
    <h2>Game Over</h2>
    <p id="final-score">You scored 0 points!</p>
    <button id="replay-btn">Play Again</button>
    
  </div>
</body>
</html>
