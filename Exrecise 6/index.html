<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petrol Cost Calculator</title>

  <!-- Link to external stylesheet -->
  <link rel="stylesheet" href="style.css" />
  <script src="index.js" href="index.js" defer></script>

 </head>
<body>

  <main class="card">
      <h1 class="card__title">Petrol Calculator</h1>
    </header>

    <section class="card__inputs">
      <div class="field">
        <label class="field__label" for="price-per-litre">
          Price per Litre
          <span class="field__unit">SAR</span>
        </label>
        <div class="field__wrapper">
          <!-- Default value set to 1.72 as specified --> 
          <input
            class="field__input"
            type="number"
            id="price-per-litre"
            name="price-per-litre"
            value="1.72"
            min="0"
            step="0.01"
            aria-label="Cost of petrol per litre in SAR"
            />
        </div>
      </div>

      <!-- Field 2: Number of litres purchased -->
      <div class="field">
        <label class="field__label" for="litres">
          Litres Purchased
          <span class="field__unit">L</span>
        </label>
        <div class="field__wrapper">
          <!-- Default value set to 0 as specified -->
          <input
            class="field__input"
            type="number"
            id="litres"
            name="litres"
            value="0"
            min="0"
            step="0.5"
            aria-label="Number of litres of petrol purchased"
          />
        </div>
      </div>

    </section>

    <!-- =============================================
         CALCULATE BUTTON
         Triggers the cost calculation on click
    ============================================= -->
    <button class="btn" id="calculate-btn" type="button" aria-label="Calculate total petrol cost">
      <span class="btn__text">Calculate Total</span>
      <span class="btn__arrow" aria-hidden="true">→</span>
    </button>

    <!-- =============================================
         RESULT SECTION
         Displays the computed total cost.
         Hidden by default; shown after calculation.
    ============================================= -->
    <div class="result" id="result-section" aria-live="polite">
      <p class="result__label">Total Cost</p>
      <!-- This <p> tag is updated by JavaScript with the calculated total -->
      <p class="result__value" id="total-cost">SAR 0.00</p>
    </div>

  </main>

  <!-- Link to external JavaScript file -->
  <script src="script.js"></script>

</body>
</html>
